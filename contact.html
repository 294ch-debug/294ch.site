<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CONTACT | 294.</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
  background:#0a0a0a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.form-box{
  width:100%;
  max-width:520px;
  padding:40px;
  background:rgba(255,255,255,.05);
  border-radius:20px;
  backdrop-filter: blur(10px);
}

input, textarea{
  width:100%;
  margin-bottom:20px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,.1);
  color:#fff;
}

textarea{min-height:140px; resize:none;}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="form-box">
  <h2>CONTACT</h2>

  <form action="https://formspree.io/f/mzdawpqn" method="POST">
    
    <input type="text" name="name" placeholder="お名前" required>
    
    <input type="text" name="subject" placeholder="件名" required>
    
    <textarea name="message" placeholder="内容" required></textarea>

    <!-- Turnstile -->
    <div class="cf-turnstile"
         data-sitekey="ここにSiteKeyを入れる">
    </div>

    <button type="submit">送信</button>

  </form>
</div>

</body>
</html>
