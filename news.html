<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>294. | NEWS</title>
<link rel="icon" type="image/png" href="294_logo_White_AI_data_0226-removebg-preview.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fg:#ffffff;
  --muted:rgba(255,255,255,.7);
  --line:rgba(255,255,255,.18);
  --soft:rgba(255,255,255,.08);
}

html,body{height:100%}
body{
  color:var(--fg);
  font-family: ui-sans-serif, system-ui, -apple-system,
  "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  background: url("bg.png") center / cover no-repeat fixed;
  overflow-x:hidden;
}

.bg-dim{
  min-height:100vh;
  background: linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,.72));
}

a{color:inherit;text-decoration:none}
.container{max-width:1120px;margin:0 auto;padding:0 20px}

/* dim overlay */
.page-dim{
  position:fixed; inset:0;
  background: rgba(0,0,0,.0);
  opacity:0; pointer-events:none;
  z-index:8;
  transition: opacity .18s ease;
}

/* Header */
header{
  position:sticky; top:0; z-index:10;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
}
.header-inner{
  display:flex; justify-content:space-between; align-items:center;
  height:120px; padding:8px 0; gap:16px;
}
.logo{
  font-weight:800; letter-spacing:.18em;
  font-size:18px; opacity:.95;
  min-width:90px;
}

/* NAV */
nav{
  display:flex; gap:18px; align-items:center; justify-content:center;
  flex:1; min-width:0;
}
nav a{
  display:inline-flex; align-items:center;
  padding:10px 6px; border-radius:14px;
  position:relative; min-width:0;
}
.nav-sticker{
  height:84px; width:auto; display:block; max-width:100%;
  filter: drop-shadow(0 14px 26px rgba(0,0,0,.55));
  transition: transform .18s ease, filter .18s ease, opacity .18s ease;
  transform: translateZ(0);
}
.header-spacer{min-width:90px}

@media (max-width:560px){
  .header-inner{height:auto; padding:10px 0 14px}
  .logo,.header-spacer{display:none}
  nav{width:100%; justify-content:center; gap:10px; flex-wrap:wrap; padding:4px 0}
  nav a{padding:8px 4px}
  .nav-sticker{height:58px}
}

@media (hover:hover) and (pointer:fine){
  nav:hover a{opacity:.45}
  nav:hover a:hover{opacity:1}

  nav a:hover .nav-sticker{
    transform: translateY(-6px) scale(1.35) rotate(-2deg);
    filter: drop-shadow(0 26px 44px rgba(0,0,0,.70));
  }
  nav:hover a:not(:hover) .nav-sticker{
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.45)) blur(.35px);
  }
  body.nav-dim .page-dim{
    opacity:1;
    background: rgba(0,0,0,.28);
  }
}

/* Main */
.hero-mini{
  padding:70px 0 26px;
}
.hero-mini h1{
  font-size:14px;
  letter-spacing:.25em;
  opacity:.95;
}

/* News list */
.section{padding:40px 0 70px;border-top:1px solid var(--line)}
.card{
  border:1px solid var(--line);
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(8px);
  padding:28px;
  border-radius:18px;
}
.news-list{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.news-item{
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:16px 0;
  border-bottom:1px solid rgba(255,255,255,.10);
}
.news-item:last-child{border-bottom:none;padding-bottom:0}
.news-date{
  font-size:12px;
  letter-spacing:.08em;
  color:var(--muted);
}
.news-title{
  font-size:14px;
  font-weight:700;
}
.news-body{
  font-size:13px;
  color:rgba(255,255,255,.88);
  line-height:1.7;
}

footer{
  border-top:1px solid var(--line);
  padding:30px 0;font-size:12px;color:var(--muted);text-align:center;
}
</style>
</head>

<body>
<div class="page-dim" aria-hidden="true"></div>
<div class="bg-dim">

<header>
  <div class="container header-inner">
    <div class="logo">294CH</div>
    <nav aria-label="Site navigation" id="siteNav">
      <a href="index.html" aria-label="TOP"><img class="nav-sticker" src="top_touka.png" alt="TOP"></a>
      <a href="news.html" aria-label="NEWS"><img class="nav-sticker" src="news_touka.png" alt="NEWS"></a>
      <a href="discography.html" aria-label="DISCOGRAPHY"><img class="nav-sticker" src="discography_touka.png" alt="DISCOGRAPHY"></a>
      <a href="about.html" aria-label="ABOUT"><img class="nav-sticker" src="about_touka.png" alt="ABOUT"></a>
      <a href="contact.html" aria-label="CONTACT"><img class="nav-sticker" src="contact_touka.png" alt="CONTACT"></a>
    </nav>
    <div class="header-spacer" aria-hidden="true"></div>
  </div>
</header>

<main class="container">
  <section class="hero-mini">
    <h1>NEWS</h1>
  </section>

  <section class="section">
    <div class="card">
      <div class="news-list">

        <article class="news-item">
          <div class="news-date">2026/xx/xx</div>
          <div class="news-title">coming soon</div>
          <div class="news-body">coming soon</div>
        </article>

        <article class="news-item">
          <div class="news-date">2026/xx/xx</div>
          <div class="news-title">1st Single "xxxx"</div>
          <div class="news-body">coming soon</div>
        </article>

      </div>
    </div>
  </section>
</main>

<footer>© 294ch works</footer>
</div>

<script>
(() => {
  const nav = document.getElementById("siteNav");
  if (!nav) return;
  nav.addEventListener("mouseenter", () => document.body.classList.add("nav-dim"));
  nav.addEventListener("mouseleave", () => document.body.classList.remove("nav-dim"));
})();
</script>

</body>
</html>
