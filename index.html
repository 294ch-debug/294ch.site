<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>294. | Official Website</title>

<link rel="icon" type="image/png" href="294_logo_White_AI_data_0226-removebg-preview.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#000000;
  --fg:#ffffff;
  --muted:rgba(255,255,255,.6);
  --line:rgba(255,255,255,.14);
  --soft:rgba(255,255,255,.05);
}

body{
  background:var(--bg);
  color:var(--fg);
  font-family: ui-sans-serif, system-ui, -apple-system,
  "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
}

a{color:inherit;text-decoration:none}

.container{
  max-width:1120px;
  margin:0 auto;
  padding:0 20px;
}

/* Header */
header{
  position:sticky;
  top:0;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  z-index:10;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:70px;
}

.logo{
  font-weight:800;
  letter-spacing:.18em;
  font-size:14px;
}

/* NAV (画像ボタン化) */
nav{
  display:flex;
  gap:14px;
  overflow-x:auto;
  white-space:nowrap;
  -webkit-overflow-scrolling:touch;
  align-items:center;
  padding:6px 0;
}

nav a{
  display:inline-flex;
  align-items:center;
  opacity:.88;
  transition:.2s;
}

nav a:hover{opacity:1}

/* 画像の見た目調整 */
.nav-sticker{
  height:34px;          /* ← 全体サイズはここで調整 */
  width:auto;
  display:block;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,.35));
  transform: translateZ(0);
}

nav a:hover .nav-sticker{
  transform: translateY(-1px);
}

/* スマホは少し小さく */
@media (max-width: 520px){
  .nav-sticker{ height:28px; }
  nav{ gap:10px; }
}

/* HERO */
.hero{
  padding:160px 0 120px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.hero-logo{
  width:100%;
  max-width:760px;
}

.hero-logo video{
  width:100%;
  height:auto;
  display:block;
  background:transparent;
}

/* Section */
.section{
  padding:70px 0;
  border-top:1px solid var(--line);
}

.section h2{
  font-size:13px;
  letter-spacing:.25em;
  margin-bottom:24px;
}

.card{
  border:1px solid var(--line);
  padding:28px;
  border-radius:18px;
}

.release-links{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.button{
  display:inline-flex;
  align-items:center;
  height:40px;
  padding:0 16px;
  border:1px solid var(--line);
  border-radius:999px;
  font-size:12px;
  transition:.2s;
}

.button:hover{
  background:var(--soft);
}

/* Footer */
footer{
  border-top:1px solid var(--line);
  padding:30px 0;
  font-size:12px;
  color:var(--muted);
  text-align:center;
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">294CH</div>

    <!-- ここ：文字→画像に置き換え済み -->
    <nav aria-label="Site navigation">
      <a href="#top" aria-label="TOP">
        <img class="nav-sticker" src="top_touka.png" alt="TOP">
      </a>
      <a href="#news" aria-label="NEWS">
        <img class="nav-sticker" src="news_touka.png" alt="NEWS">
      </a>
      <a href="#disco" aria-label="DISCOGRAPHY">
        <img class="nav-sticker" src="discography_touka.png" alt="DISCOGRAPHY">
      </a>
      <a href="#about" aria-label="ABOUT">
        <img class="nav-sticker" src="about_touka.png" alt="ABOUT">
      </a>
      <a href="#contact" aria-label="CONTACT">
        <img class="nav-sticker" src="contact_touka.png" alt="CONTACT">
      </a>
    </nav>
  </div>
</header>

<main id="top" class="container">

  <!-- HERO（動画ロゴ） -->
  <section class="hero">
    <h1 class="hero-logo">
      <video
        src="294_logo_mask.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto">
      </video>
    </h1>
  </section>

  <section id="news" class="section">
    <h2>NEWS</h2>
    <div class="card">Coming soon</div>
  </section>

  <section id="disco" class="section">
    <h2>DISCOGRAPHY</h2>
    <div class="card">
      <strong>Coming soon</strong>
      <div class="release-links">
        <a class="button" href="https://open.spotify.com/" target="_blank">Spotify</a>
        <a class="button" href="https://music.apple.com/" target="_blank">Apple Music</a>
      </div>
    </div>
  </section>

  <section id="about" class="section">
    <h2>ABOUT</h2>
    <div class="card">Coming soon</div>
  </section>

  <section id="contact" class="section">
    <h2>CONTACT</h2>
    <div class="card">
      <p>294.に関するお問い合わせは、下記フォームよりお送りください。</p>
      <p style="margin-top:12px;">
        Mail:
        <a href="mailto:contact@294ch.com">contact@294ch.com</a>
      </p>
    </div>
  </section>

</main>

<footer>
  © 294ch works
</footer>

</body>
</html>
