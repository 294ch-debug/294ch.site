<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>294. | Official Website</title>
<link rel="icon" type="image/png" href="294_logo_White_AI_data_0226-removebg-preview.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fg:#ffffff;
  --muted:rgba(255,255,255,.7);
  --line:rgba(255,255,255,.18);
  --soft:rgba(255,255,255,.08);
}

body{
  color:var(--fg);
  font-family: ui-sans-serif, system-ui, -apple-system,
  "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  background: url("bg.png") center / cover no-repeat fixed;
}

.bg-dim{
  min-height:100vh;
  background: linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,.72));
}

a{color:inherit;text-decoration:none}
.container{max-width:1120px;margin:0 auto;padding:0 20px}

/* Header */
header{
  position:sticky; top:0; z-index:10;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
}
.header-inner{
  display:flex; justify-content:space-between; align-items:center;
  height:82px;
}
.logo{font-weight:800;letter-spacing:.18em;font-size:14px;opacity:.9}

/* NAV */
nav{display:flex;gap:16px;align-items:center}
nav a{display:inline-flex;align-items:center}
.nav-sticker{
  height:62px; width:auto; display:block;
  filter: drop-shadow(0 12px 22px rgba(0,0,0,.55));
  transition: transform .18s ease, filter .18s ease;
  transform: translateZ(0);
}
@media (max-width:560px){
  .header-inner{height:74px}
  .nav-sticker{height:46px}
  nav{gap:10px}
  .logo{display:none}
}
@media (hover:hover) and (pointer:fine){
  nav a:hover .nav-sticker{
    transform: translateY(-2px) scale(1.10);
    filter: drop-shadow(0 16px 30px rgba(0,0,0,.65));
  }
  nav a:active .nav-sticker{transform: translateY(0) scale(1.05)}
}

/* HERO */
.hero{
  padding:160px 0 120px;
  display:flex; flex-direction:column; align-items:center; text-align:center;
}

/* ロゴの枠（サイズ） */
.hero-logo{
  width:100%;
  max-width:980px;
  position:relative; /* 擬似レイヤー用 */
}

/* 擬似ハイレゾ：同じ画像を背面に薄くぼかして重ねる */
.hero-logo::before{
  content:"";
  position:absolute;
  inset:-2%; /* 少しだけ外側に広げる */
  background:url("294_logo_White_AI_data_0226-removebg-preview.png") center/contain no-repeat;
  filter: blur(12px) saturate(1.18) contrast(1.05);
  opacity:.22;
  transform: translateY(10px);
  pointer-events:none;
}

/* ロゴ画像（微グロー＋浮遊＋軽い“くっきり”） */
.hero-logo img{
  width:100%;
  height:auto;
  display:block;
  position:relative;
  z-index:1;

  animation: floatLogo 6s ease-in-out infinite;

  /* 誤魔化し：演出としての発光＋少しコントラスト */
  filter:
    drop-shadow(0 30px 60px rgba(0,0,0,.60))
    drop-shadow(0 0 42px rgba(120,160,255,.30))
    contrast(1.06)
    saturate(1.04);

  transform: translateZ(0);
  backface-visibility: hidden;
}

@keyframes floatLogo{
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-14px); }
  100% { transform: translateY(0px); }
}

/* 動きが苦手な環境では停止 */
@media (prefers-reduced-motion: reduce){
  .hero-logo img{ animation:none; }
}

@media (max-width:560px){
  .hero{ padding:140px 0 90px; }
  .hero-logo{ max-width:92vw; }

  .hero-logo::before{
    filter: blur(10px) saturate(1.16) contrast(1.04);
    opacity:.20;
    transform: translateY(8px);
  }

  .hero-logo img{
    filter:
      drop-shadow(0 24px 50px rgba(0,0,0,.60))
      drop-shadow(0 0 34px rgba(120,160,255,.28))
      contrast(1.05)
      saturate(1.03);
  }
}

/* Section */
.section{padding:70px 0;border-top:1px solid var(--line)}
.section h2{font-size:13px;letter-spacing:.25em;margin-bottom:24px;opacity:.95}
.card{
  border:1px solid var(--line);
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(8px);
  padding:28px;
  border-radius:18px;
}
footer{
  border-top:1px solid var(--line);
  padding:30px 0;font-size:12px;color:var(--muted);text-align:center;
}
</style>
</head>

<body>
<div class="bg-dim">

<header>
  <div class="container header-inner">
    <div class="logo">294CH</div>
    <nav aria-label="Site navigation">
      <a href="index.html" aria-label="TOP"><img class="nav-sticker" src="top_touka.png" alt="TOP"></a>
      <a href="news.html" aria-label="NEWS"><img class="nav-sticker" src="news_touka.png" alt="NEWS"></a>
      <a href="discography.html" aria-label="DISCOGRAPHY"><img class="nav-sticker" src="discography_touka.png" alt="DISCOGRAPHY"></a>
      <a href="about.html" aria-label="ABOUT"><img class="nav-sticker" src="about_touka.png" alt="ABOUT"></a>
      <a href="contact.html" aria-label="CONTACT"><img class="nav-sticker" src="contact_touka.png" alt="CONTACT"></a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="hero">
    <h1 class="hero-logo">
      <img src="294_logo_White_AI_data_0226-removebg-preview.png" alt="294.">
    </h1>
  </section>

  <section class="section">
    <h2>TOP</h2>
    <div class="card">Coming soon</div>
  </section>
</main>

<footer>© 294ch works</footer>
</div>
</body>
</html>
