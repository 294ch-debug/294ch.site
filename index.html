<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>294. | Official Website</title>

<link rel="icon" type="image/png" href="294_logo_White_AI_data_0226-removebg-preview.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#ffffff;
  --fg:#0a0a0a;
  --muted:rgba(10,10,10,.6);
  --line:rgba(10,10,10,.14);
  --soft:rgba(10,10,10,.05);
}

body{
  background:#ffffff;
  color:var(--fg);
  font-family: ui-sans-serif, system-ui, -apple-system,
  "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
}

a{color:inherit;text-decoration:none}

.container{
  max-width:1120px;
  margin:0 auto;
  padding:0 20px;
}

/* Header */
header{
  position:sticky;
  top:0;
  background:#ffffff;
  border-bottom:1px solid var(--line);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:70px;
}

.logo{
  font-weight:800;
  letter-spacing:.18em;
  font-size:14px;
}

nav{
  display:flex;
  gap:18px;
  overflow-x:auto;
  white-space:nowrap;
}

nav a{
  font-size:12px;
  opacity:.7;
}

nav a:hover{opacity:1}

/* HERO */
.hero{
  padding:160px 0 120px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.hero-logo img{
  width:100%;
  max-width:760px;
  height:auto;
  display:block;
}

/* Section */
.section{
  padding:70px 0;
  border-top:1px solid var(--line);
}

.section h2{
  font-size:13px;
  letter-spacing:.25em;
  margin-bottom:24px;
}

.card{
  border:1px solid var(--line);
  padding:28px;
  border-radius:18px;
}

.release-links{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.button{
  display:inline-flex;
  align-items:center;
  height:40px;
  padding:0 16px;
  border:1px solid var(--line);
  border-radius:999px;
  font-size:12px;
  transition:.2s;
}

.button:hover{
  background:var(--soft);
}

/* Footer */
footer{
  border-top:1px solid var(--line);
  padding:30px 0;
  font-size:12px;
  color:var(--muted);
  text-align:center;
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">294CH</div>
    <nav>
      <a href="#top">TOP</a>
      <a href="#news">NEWS</a>
      <a href="#disco">DISCOGRAPHY</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </div>
</header>

<main id="top" class="container">

  <!-- HERO -->
  <section class="hero">
    <h1 class="hero-logo">
      <img src="294_logo_White_AI_data_0226-removebg-preview.png" alt="294.">
    </h1>
  </section>

  <!-- NEWS -->
  <section id="news" class="section">
    <h2>NEWS</h2>
    <div class="card">
      Coming soon
    </div>
  </section>

  <!-- DISCOGRAPHY -->
  <section id="disco" class="section">
    <h2>DISCOGRAPHY</h2>
    <div class="card">
      <strong>Coming soon</strong>
      <div class="release-links">
        <a class="button" href="https://open.spotify.com/" target="_blank">Spotify</a>
        <a class="button" href="https://music.apple.com/" target="_blank">Apple Music</a>
      </div>
    </div>
  </section>

  <!-- ABOUT -->
  <section id="about" class="section">
    <h2>ABOUT</h2>
    <div class="card">
      Coming soon
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="section">
    <h2>CONTACT</h2>
    <div class="card">
      <p>
        294.に関するお問い合わせは、下記フォームよりお送りください。
      </p>
      <p style="margin-top:12px;">
        Mail:
        <a href="mailto:contact@294ch.com">contact@294ch.com</a>
      </p>
    </div>
  </section>

</main>

<footer>
  © 294.
</footer>

</body>
</html>
