<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>294. | Official Website</title>
<link rel="icon" type="image/png" href="294_logo_White_AI_data_0226-removebg-preview.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fg:#ffffff;
  --muted:rgba(255,255,255,.72);
  --line:rgba(255,255,255,.18);
  --soft:rgba(255,255,255,.10);
}

body{
  color:var(--fg);
  font-family: ui-sans-serif, system-ui, -apple-system,
  "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  background:url("bg.png") center / cover no-repeat fixed;
}

a{color:inherit;text-decoration:none}
.container{max-width:1120px;margin:0 auto;padding:0 20px}

.bg-dim{
  min-height:100vh;
  background:linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,.78));
}

/* ====== PAGE DIM OVERLAY（nav hoverでページ全体を暗く） ====== */
.page-dim{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.22);
  opacity:0;
  transition:opacity .18s ease;
  pointer-events:none;
  z-index:9; /* header(10)より下 */
}
body.nav-hover .page-dim{opacity:1}

/* ====== HEADER（共通） ====== */
header{
  position:sticky;top:0;z-index:10;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.header-inner{
  display:flex;
  justify-content:center;
  align-items:center;
  height:110px;
}

/* ====== NAV（共通） ====== */
nav{
  display:flex;
  justify-content:center;
  gap:40px;
  align-items:center;
}
nav a{
  display:inline-flex;
  align-items:center;
  padding:10px 6px;
  transition: transform .22s ease, opacity .22s ease, filter .22s ease;
  transform:translateZ(0);
  position:relative;
  z-index:10;
}
.nav-sticker{
  height:90px;
  width:auto;
  display:block;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,.65));
  transition: transform .22s ease, filter .22s ease;
}

/* PC hover（過剰拡大＋他を薄く） */
@media (hover:hover) and (pointer:fine){
  nav:hover a{opacity:.25;filter:brightness(.78)}
  nav a:hover{opacity:1;filter:brightness(1);transform:scale(1.55);z-index:11}
  nav a:hover .nav-sticker{filter: drop-shadow(0 28px 55px rgba(0,0,0,.78))}
  nav a:active{transform:scale(1.42)}
}

/* スマホ：中央固定 */
@media (max-width:560px){
  .header-inner{height:88px}
  nav{
    width:100%;
    justify-content:center;
    gap:10px;
    overflow:hidden;
  }
  nav a{
    padding:8px 0;
    flex:0 0 auto;
    justify-content:center;
    transform:none !important;
  }
  .nav-sticker{height:56px}
}

/* ====== HERO / SECTION ====== */
.hero{
  padding:160px 0 120px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}
.hero-logo{
  width:100%;
  max-width:980px;
}
.hero-logo img{
  width:100%;
  height:auto;
  display:block;
  animation: floatLogo 6s ease-in-out infinite;
  filter:
    drop-shadow(0 30px 60px rgba(0,0,0,.60))
    drop-shadow(0 0 42px rgba(120,160,255,.30));
  transform: translateZ(0);
}
@keyframes floatLogo{
  0%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
  100%{transform:translateY(0)}
}
@media (prefers-reduced-motion: reduce){
  .hero-logo img{animation:none}
}
@media (max-width:560px){
  .hero{padding:140px 0 90px}
  .hero-logo{max-width:92vw}
}

/* content */
.section{padding:70px 0;border-top:1px solid var(--line)}
.section h2{font-size:13px;letter-spacing:.25em;margin-bottom:24px;opacity:.95}
.card{
  border:1px solid var(--line);
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(8px);
  padding:28px;
  border-radius:18px;
}
footer{
  border-top:1px solid var(--line);
  padding:30px 0;
  font-size:12px;
  color:var(--muted);
  text-align:center;
}

/* ===== TOPのNEWSティザー（追加） ===== */
.news-teaser{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.news-teaser a{
  display:flex;
  align-items:baseline;
  gap:14px;
  padding:14px 16px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(0,0,0,.28);
  transition:transform .18s ease, background .18s ease, opacity .18s ease;
}
.news-teaser a:hover{transform:scale(1.01); background:rgba(0,0,0,.33)}
.news-teaser .date{
  font-size:12px;
  color:var(--muted);
  letter-spacing:.12em;
  white-space:nowrap;
}
.news-teaser .title{
  font-size:14px;
  font-weight:700;
}
</style>
</head>

<body>
<div class="page-dim" aria-hidden="true"></div>

<div class="bg-dim">
<header>
  <div class="container header-inner">
    <nav aria-label="Site navigation">
      <a href="index.html" aria-label="TOP"><img class="nav-sticker" src="top_touka.png" alt="TOP"></a>
      <a href="news.html" aria-label="NEWS"><img class="nav-sticker" src="news_touka.png" alt="NEWS"></a>
      <a href="discography.html" aria-label="DISCOGRAPHY"><img class="nav-sticker" src="discography_touka.png" alt="DISCOGRAPHY"></a>
      <a href="about.html" aria-label="ABOUT"><img class="nav-sticker" src="about_touka.png" alt="ABOUT"></a>
      <a href="contact.html" aria-label="CONTACT"><img class="nav-sticker" src="contact_touka.png" alt="CONTACT"></a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="hero">
    <h1 class="hero-logo">
      <img src="294_logo_White_AI_data_0226-removebg-preview.png" alt="294.">
    </h1>
  </section>

  <section class="section">
    <h2>TOP</h2>
    <div class="card">Coming soon</div>
  </section>

  <!-- ★追加：TOPにNEWSタブ（タイトルだけ） -->
  <section class="section">
    <h2>NEWS</h2>
    <div class="card">
      <div class="news-teaser">
        <a href="news.html#news-1" aria-label="NEWS: coming soon">
          <span class="date">2026/xx/xx</span>
          <span class="title">coming soon</span>
        </a>

        <a href="news.html#news-2" aria-label="NEWS: 1st Single &quot;xxxx&quot;">
          <span class="date">2026/xx/xx</span>
          <span class="title">1st Single &quot;xxxx&quot;</span>
        </a>
      </div>
    </div>
  </section>
</main>

<footer>© 294ch works</footer>
</div>

<script>
const body = document.body;
const nav = document.querySelector("header nav");
if (nav) {
  nav.addEventListener("mouseenter", ()=> body.classList.add("nav-hover"));
  nav.addEventListener("mouseleave", ()=> body.classList.remove("nav-hover"));
  nav.addEventListener("focusin", ()=> body.classList.add("nav-hover"));
  nav.addEventListener("focusout", (e)=>{
    if(!nav.contains(e.relatedTarget)) body.classList.remove("nav-hover");
  });
}
</script>
</body>
</html>
